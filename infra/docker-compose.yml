services:
  sa-helper:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config
    ports:
      - "8088:8080"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-true}
      - PORT=8080
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-test12345678}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin123}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-123456}
      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - QUEUE_WORKERS=${QUEUE_WORKERS:-4}
      - EXAM_OCR_CONCURRENCY=${EXAM_OCR_CONCURRENCY:-2}
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      ajax_network:
        ipv4_address: 172.60.0.63

volumes:
  sa_helper_logs:
  sa_helper_data:
  sa_helper_config:

networks:
  ajax_network:
    external: true
