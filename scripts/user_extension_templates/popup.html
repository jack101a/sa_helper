<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="ta-ta browser assistant">
<title>ta-ta</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="bg-blobs">
  <div class="blob blob-p"></div>
  <div class="blob blob-s"></div>
</div>

<div class="header">
  <div class="logo-box">T</div>
  <div class="header-text">
    <h1>ta-ta</h1>
    <p id="sub-header">Loading...</p>
  </div>
  <div id="master-tag" class="master-badge" style="display:none;"></div>
  <button id="popup-theme-toggle" style="margin-left:auto;background:none;border:none;font-size:18px;cursor:pointer;padding:4px;" aria-label="Toggle theme">🌙</button>
</div>

<div id="view-auth" class="view">
  <div class="auth-icon">🔑</div>
  <div class="auth-title">Authentication</div>
  <div class="auth-desc">Enter your API key to connect.</div>

  <div style="margin-bottom: 16px;">
    <input type="password" id="input-key" class="field-input" placeholder="Enter API Key" required autocomplete="off">
  </div>

  <button id="btn-auth-submit" class="btn btn-primary">Connect Account</button>
  <div id="auth-error" style="color:var(--danger); font-size:11px; margin-top:12px; font-weight:600; min-height:16px;"></div>
</div>

<div id="view-user" class="view">
  <div class="user-status">
    <div class="conn-status">
      <span class="status-dot ok" id="user-dot"></span>
    </div>
    <div class="expiry-badge" id="user-expiry">-- days remaining</div>
  </div>

  <div class="profile-row" id="user-profile-row">
    <select id="user-profile-select" class="profile-select"></select>
    <button id="user-btn-add-profile" class="btn-add-profile" title="Create New Profile">＋</button>
  </div>

  <div class="section">
    <div class="section-title">Automation Controls</div>
    <div class="card">
      <div class="toggle-row">
        <div>
          <div class="label-main">Autofill Engine</div>
          <div class="label-sub">Smart field detection</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="user-tog-autofill" aria-label="Enable autofill">
          <span class="slider"></span>
        </label>
      </div>
      <div class="toggle-row">
        <div>
          <div class="label-main">Captcha Solver</div>
          <div class="label-sub">Auto-solve on detect</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="user-tog-captcha" aria-label="Enable captcha solver">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div id="stall-action-section" style="display:none;">
      <div class="section-title" style="margin-top: 16px;">STALL</div>
      <div class="card card-compact">
        <button id="btn-stall-start" class="btn btn-accent">Start STALL</button>
      </div>
    </div>

    <div class="expiry-row">
      <span>Key: </span>
      <span id="user-key-name" style="font-weight:700; color:var(--fg);">--</span>
      <span style="margin-left:8px;">•</span>
      <button id="btn-logout" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:10px; font-weight:700;">Logout</button>
    </div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
