name: Build and Push Admin UI Image

on:
  push:
    branches: ["master"]
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # 1. Skip QEMU on self-hosted/Gitea, only run it on GitHub
      - name: Set up QEMU
        if: ${{ github.server_url == 'https://github.com' }}
        uses: docker/setup-qemu-action@v3

      # 2. Stable Buildx on Gitea, latest on GitHub
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: ${{ github.server_url == 'https://github.com' && 'latest' || 'v0.9.1' }}
          driver: ${{ github.server_url == 'https://github.com' && 'docker-container' || 'docker' }}

      - name: Resolve Registry/Image
        id: registry
        shell: bash
        run: |
          set -eu
          if [ "${{ github.server_url }}" = "https://github.com" ]; then
            REGISTRY_HOST="ghcr.io"
            IMAGE_REF="ghcr.io/${{ github.repository }}-ui"
          else
            REGISTRY_HOST="$(echo "${{ github.server_url }}" | sed -E 's#^https?://##; s#/$##')"
            IMAGE_REF="${REGISTRY_HOST}/${{ github.repository }}-ui"
          fi
          echo "registry_host=${REGISTRY_HOST}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.registry.outputs.image_ref }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-

      # 3. Only login to GHCR on GitHub-hosted flow
      - name: Log in to GHCR
        if: ${{ github.server_url == 'https://github.com' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Gitea Registry
        if: ${{ github.server_url != 'https://github.com' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry_host }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITEAPAT }}

      # 4. Push on both platforms; multi-arch only on GitHub
      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: ${{ github.server_url == 'https://github.com' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
