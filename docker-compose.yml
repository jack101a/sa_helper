x-app-env: &common-env
  CONFIG_PATH: /app/backend/config/config.yaml
  APP_ENV: production
  DEBUG: ${DEBUG}
  AUTH_HASH_SALT: ${AUTH_HASH_SALT:?AUTH_HASH_SALT must be set in .env}
  ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN must be set in .env}
  ADMIN_USERNAME: ${ADMIN_USERNAME}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
  DB_TYPE: postgresql
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
  REDIS_ENABLED: "true"
  REDIS_URL: redis://redis:6379/0
  LITELLM_ENDPOINT: ${LITELLM_ENDPOINT}
  LITELLM_API_KEY: ${LITELLM_API_KEY}
  QUEUE_WORKERS: ${QUEUE_WORKERS}
  EXAM_OCR_CONCURRENCY: ${EXAM_OCR_CONCURRENCY}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
  TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED}
  TELEGRAM_API_BASE_URL: http://telegram-bot-api:8081

x-app-volumes: &common-volumes
  - ${CONFIG_PATH}/sa_helper/logs:/app/backend/logs
  - ${CONFIG_PATH}/sa_helper/data:/app/data
  - ${CONFIG_PATH}/sa_helper/config:/app/backend/config
  - ${CONFIG_PATH}/sa_helper/import:/app/import

services:
  api:
    image: ${SA_HELPER_IMAGE}
    container_name: sa-helper
    restart: unless-stopped
    init: true
    user: "${PUID}:${PGID}"
    stop_grace_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    environment:
      <<: *common-env
      RUN_ALEMBIC_MIGRATIONS: "true"
      CREATE_ALL_TABLES: "false"
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      ajax_network:
        ipv4_address: 172.60.0.63

  worker:
    image: ${SA_HELPER_IMAGE}
    container_name: sa-helper-worker
    restart: unless-stopped
    init: true
    user: "${PUID}:${PGID}"
    stop_grace_period: 120s
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - app.workers.celery_app.celery_app
      - worker
      - --loglevel=INFO
      - --concurrency=${WORKER_CONCURRENCY}
      - -Q
      - solve-heavy,feedback,maintenance,default
    environment:
      <<: *common-env
      RUN_ALEMBIC_MIGRATIONS: "false"
      CREATE_ALL_TABLES: "false"
    volumes: *common-volumes
    networks:
      - ajax_network

  telegram-bot:
    image: ${SA_HELPER_IMAGE}
    container_name: sa-helper-telegram-bot
    restart: unless-stopped
    init: true
    user: "${PUID}:${PGID}"
    stop_grace_period: 60s
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      telegram-bot-api:
        condition: service_started
    command: ["python", "-m", "app.services.telegram_bot"]
    environment:
      <<: *common-env
      RUN_ALEMBIC_MIGRATIONS: "false"
      CREATE_ALL_TABLES: "false"
    volumes: *common-volumes
    networks:
      - ajax_network

  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: sa-helper-telegram-bot-api
    restart: unless-stopped
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
    command:
      - --local
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api
      - --temp-dir=/tmp/telegram-bot-api
    volumes:
      - ${CONFIG_PATH}/sa_helper/telegram-bot-api:/var/lib/telegram-bot-api
      - ${CONFIG_PATH}/sa_helper/telegram-bot-api-tmp:/tmp/telegram-bot-api
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 8081 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - ajax_network

  postgres:
    image: postgres:16
    container_name: sa-helper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${CONFIG_PATH}/sa_helper/postgres:/var/lib/postgresql/data
    command: >
      bash -c "
        docker-entrypoint.sh postgres &
        PG_PID=$$!
        until pg_isready -U $$POSTGRES_USER; do sleep 1; done
        psql -U $$POSTGRES_USER -d $$POSTGRES_DB -c \"ALTER USER $$POSTGRES_USER WITH PASSWORD '$$POSTGRES_PASSWORD';\"
        wait $$PG_PID
      "
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ajax_network

  redis:
    image: redis:7-alpine
    container_name: sa-helper-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY}
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - ${CONFIG_PATH}/sa_helper/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ajax_network

networks:
  ajax_network:
    external: true
