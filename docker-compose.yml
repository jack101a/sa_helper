services:
  sa-helper:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:latest}
    container_name: sa-helper
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    depends_on:
      payload-signer:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      - APP_ENV=production
      - DEBUG=false
      - PORT=8080
      - PYTHONUNBUFFERED=1
      - START_TELEGRAM_BOT_IN_API=false

      - AUTH_HASH_SALT=${AUTH_HASH_SALT}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      - PAYLOAD_SIGNER_URL=http://payload-signer:8091
      - PAYLOAD_SIGNER_TOKEN=${PAYLOAD_SIGNER_TOKEN}
      - PAYLOAD_SIGNER_TIMEOUT_SECONDS=${PAYLOAD_SIGNER_TIMEOUT_SECONDS:-3}

      - SOLVER_QUEUE_BACKEND=${SOLVER_QUEUE_BACKEND:-redis}
      - SOLVER_JOB_TIMEOUT_SECONDS=${SOLVER_JOB_TIMEOUT_SECONDS:-30}
      - SOLVER_QUEUE_FALLBACK_LOCAL=${SOLVER_QUEUE_FALLBACK_LOCAL:-true}
      - REDIS_ENABLED=true
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_PREFIX=${REDIS_PREFIX:-sa_helper:}

      - QUEUE_WORKERS=${QUEUE_WORKERS:-6}
      - EXAM_OCR_CONCURRENCY=${EXAM_OCR_CONCURRENCY:-4}
      - RUN_BACKGROUND_TASKS=false
      - RUN_MIGRATIONS=true

      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}

      - CALLMEBOT_PHONE=${CALLMEBOT_PHONE:-}
      - CALLMEBOT_APIKEY=${CALLMEBOT_APIKEY:-}

      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}

      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - ${CONFIG_PATH}/sa_helper/logs:/app/backend/logs
      - ${CONFIG_PATH}/sa_helper/data:/app/data
      - ${CONFIG_PATH}/sa_helper/config:/app/backend/config
    networks:
      - ajax_network

  redis:
    image: redis:7-alpine
    container_name: sa-helper-redis
    restart: unless-stopped
    init: true
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${CONFIG_PATH}/sa_helper/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      start_period: 5s
      retries: 3
    networks:
      - ajax_network

  worker:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:latest}
    container_name: sa-helper-worker
    restart: unless-stopped
    init: true
    depends_on:
      redis:
        condition: service_healthy
    command: ["python", "-m", "app.worker"]
    environment:
      - APP_ENV=production
      - DEBUG=false
      - PYTHONUNBUFFERED=1

      - AUTH_HASH_SALT=${AUTH_HASH_SALT}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      - SOLVER_QUEUE_BACKEND=${SOLVER_QUEUE_BACKEND:-redis}
      - SOLVER_WORKER_CONCURRENCY=${SOLVER_WORKER_CONCURRENCY:-2}
      - SOLVER_RESULT_TTL_SECONDS=${SOLVER_RESULT_TTL_SECONDS:-120}
      - REDIS_ENABLED=true
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_PREFIX=${REDIS_PREFIX:-sa_helper:}

      - QUEUE_WORKERS=${QUEUE_WORKERS:-2}
      - EXAM_OCR_CONCURRENCY=${EXAM_OCR_CONCURRENCY:-2}
      - RUN_MIGRATIONS=false

      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}

      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - ${CONFIG_PATH}/sa_helper/logs:/app/backend/logs
      - ${CONFIG_PATH}/sa_helper/data:/app/data
      - ${CONFIG_PATH}/sa_helper/config:/app/backend/config
    networks:
      - ajax_network

  payload-signer:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:latest}
    container_name: sa-helper-payload-signer
    restart: unless-stopped
    init: true
    command: ["uvicorn", "app.signer_app:app", "--host", "0.0.0.0", "--port", "8091", "--workers", "1"]
    environment:
      - APP_ENV=production
      - PYTHONUNBUFFERED=1
      - PAYLOAD_SIGNER_TOKEN=${PAYLOAD_SIGNER_TOKEN}
      - PAYLOAD_SIGNING_PUBLIC_KEY_PATH=/run/sa-helper-signing/payload_signing_public.spki.b64
      - PAYLOAD_SIGNING_PRIVATE_KEY_PATH=/run/sa-helper-signing/payload_signing_private.pem
      - PAYLOAD_SIGNING_ALLOW_CREATE=true
      - RUN_MIGRATIONS=false
    volumes:
      - ${CONFIG_PATH}/sa_helper/signing:/run/sa-helper-signing
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - ajax_network

  scheduler:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:latest}
    container_name: sa-helper-scheduler
    restart: unless-stopped
    init: true
    depends_on:
      - sa-helper
    command: ["python", "-m", "app.scheduler"]
    environment:
      - APP_ENV=production
      - DEBUG=false
      - PYTHONUNBUFFERED=1

      - AUTH_HASH_SALT=${AUTH_HASH_SALT}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      - RUN_MIGRATIONS=false

      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}

      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}

      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - ${CONFIG_PATH}/sa_helper/logs:/app/backend/logs
      - ${CONFIG_PATH}/sa_helper/data:/app/data
      - ${CONFIG_PATH}/sa_helper/config:/app/backend/config
    networks:
      - ajax_network

  telegram-bot:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:latest}
    container_name: sa-helper-telegram-bot
    restart: unless-stopped
    init: true
    depends_on:
      - sa-helper
    command: ["python", "-m", "app.services.telegram_bot"]
    environment:
      - APP_ENV=production
      - DEBUG=false
      - PYTHONUNBUFFERED=1

      - AUTH_HASH_SALT=${AUTH_HASH_SALT}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      - TELEGRAM_BOT_WAIT_FOR_TOKEN=${TELEGRAM_BOT_WAIT_FOR_TOKEN:-true}

      - RUN_MIGRATIONS=false

      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - ${CONFIG_PATH}/sa_helper/logs:/app/backend/logs
      - ${CONFIG_PATH}/sa_helper/data:/app/data
      - ${CONFIG_PATH}/sa_helper/config:/app/backend/config
    networks:
      - ajax_network

networks:
  ajax_network:
    external: true
