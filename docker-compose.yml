services:
  sa-helper:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    ports:
      - "8088:8080"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-true}
      - PORT=8080
      # Auth Settings
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Exam AI Settings
      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - QUEUE_WORKERS=${QUEUE_WORKERS:-4}
      - EXAM_OCR_CONCURRENCY=${EXAM_OCR_CONCURRENCY:-2}
      - RUN_BACKGROUND_TASKS=false
      - RUN_MIGRATIONS=true
      # WhatsApp Alerts (Optional)
      - CALLMEBOT_PHONE=${CALLMEBOT_PHONE:-}
      - CALLMEBOT_APIKEY=${CALLMEBOT_APIKEY:-}
      # Telegram Bot (optional; DB/admin token is also supported)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      # Paths (Internal)
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config

  scheduler:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper-scheduler
    restart: unless-stopped
    init: true
    depends_on:
      - sa-helper
    command: ["python", "-m", "app.scheduler"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-true}
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      - RUN_MIGRATIONS=false
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config

  telegram-bot:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper-telegram-bot
    restart: unless-stopped
    init: true
    depends_on:
      - sa-helper
    command: ["python", "-m", "app.services.telegram_bot"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-true}
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      - TELEGRAM_BOT_WAIT_FOR_TOKEN=${TELEGRAM_BOT_WAIT_FOR_TOKEN:-true}
      - RUN_MIGRATIONS=false
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config

volumes:
  sa_helper_logs:
  sa_helper_data:
  sa_helper_config:
