x-app-env: &common-env
  CONFIG_PATH: /app/backend/config/config.yaml
  APP_ENV: ${APP_ENV:-production}
  DEBUG: ${DEBUG:-false}
  AUTH_HASH_SALT: ${AUTH_HASH_SALT}
  ADMIN_TOKEN: ${ADMIN_TOKEN}
  ADMIN_USERNAME: ${ADMIN_USERNAME}
  ADMIN_PASSWORD: ${ADMIN_PASSWORD}
  DB_TYPE: ${DB_TYPE:-postgresql}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  SOLVE_BACKEND: ${SOLVE_BACKEND:-inprocess}
  REDIS_ENABLED: ${REDIS_ENABLED:-false}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  LITELLM_ENDPOINT: ${LITELLM_ENDPOINT:-}
  LITELLM_API_KEY: ${LITELLM_API_KEY:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  QUEUE_WORKERS: ${QUEUE_WORKERS:-2}
  EXAM_OCR_CONCURRENCY: ${EXAM_OCR_CONCURRENCY:-2}
  MAX_PENDING_TASKS: ${MAX_PENDING_TASKS:-500}
  TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
  TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
  START_TELEGRAM_BOT_IN_API: ${START_TELEGRAM_BOT_IN_API:-false}
  TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-https://api.telegram.org}
  TELEGRAM_BOT_WAIT_FOR_TOKEN: ${TELEGRAM_BOT_WAIT_FOR_TOKEN:-true}
  TELEGRAM_BOT_TOKEN_POLL_SECONDS: ${TELEGRAM_BOT_TOKEN_POLL_SECONDS:-15}
  RUN_ALEMBIC_MIGRATIONS: ${RUN_ALEMBIC_MIGRATIONS:-true}
  CREATE_ALL_TABLES: ${CREATE_ALL_TABLES:-false}
  BACKUP_POSTGRES_INCLUDE_GLOBALS: ${BACKUP_POSTGRES_INCLUDE_GLOBALS:-false}
  BACKUP_ENCRYPTION_ENABLED: ${BACKUP_ENCRYPTION_ENABLED:-true}
  BACKUP_ENCRYPTION_METHOD: ${BACKUP_ENCRYPTION_METHOD:-age}
  BACKUP_AGE_RECIPIENT: ${BACKUP_AGE_RECIPIENT:-}
  BACKUP_GPG_RECIPIENT: ${BACKUP_GPG_RECIPIENT:-}
  BACKUP_TELEGRAM_ENABLED: ${BACKUP_TELEGRAM_ENABLED:-false}
  BACKUP_TELEGRAM_CHAT_ID: ${BACKUP_TELEGRAM_CHAT_ID:-}
  BACKUP_TELEGRAM_SEND_FILE: ${BACKUP_TELEGRAM_SEND_FILE:-true}
  BACKUP_TELEGRAM_MAX_FILE_MB: ${BACKUP_TELEGRAM_MAX_FILE_MB:-45}
  BACKUP_RCLONE_ENABLED: ${BACKUP_RCLONE_ENABLED:-false}
  BACKUP_RCLONE_DESTINATION: ${BACKUP_RCLONE_DESTINATION:-}
  RCLONE_CONFIG: ${RCLONE_CONFIG:-/app/runtime/rclone/rclone.conf}
  BACKUP_AUTO_ENABLED: ${BACKUP_AUTO_ENABLED:-false}
  BACKUP_SCHEDULE_TYPE: ${BACKUP_SCHEDULE_TYPE:-cron}
  BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
  BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-24}
  BACKUP_TIMEZONE: ${BACKUP_TIMEZONE:-Asia/Kolkata}
  BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
  BACKUP_LOCAL_RETENTION_COUNT: ${BACKUP_LOCAL_RETENTION_COUNT:-10}

x-app-volumes: &common-volumes
  - ${CONFIG_PATH:-./runtime}/sa_helper/logs:/app/backend/logs
  - ${CONFIG_PATH:-./runtime}/sa_helper/data:/app/data
  - ${CONFIG_PATH:-./runtime}/sa_helper/config:/app/backend/config
  - ${CONFIG_PATH:-./runtime}/sa_helper/import:/app/import
  - ${CONFIG_PATH:-./runtime}/sa_helper/rclone:/app/runtime/rclone
  - ${CONFIG_PATH:-./runtime}/sa_helper/backups:/app/runtime/sa_helper/backups

services:
  postgres:
    image: postgres:16
    container_name: sa-helper-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ${CONFIG_PATH:-./runtime}/sa_helper/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "PGPASSWORD=$${POSTGRES_PASSWORD} psql -h 127.0.0.1 -U $${POSTGRES_USER} -d $${POSTGRES_DB} -tAc 'SELECT 1' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ajax_network

  api:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:latest}
    container_name: sa-helper-api
    restart: unless-stopped
    init: true
    user: "${PUID}:${PGID}"
    stop_grace_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8088}:8080"
    environment:
      <<: *common-env
      REDIS_ENABLED: "false"
      SOLVE_BACKEND: "inprocess"
      TELEGRAM_BOT_ENABLED: "false"
      START_TELEGRAM_BOT_IN_API: "false"
      RUN_ALEMBIC_MIGRATIONS: "${RUN_ALEMBIC_MIGRATIONS:-true}"
      CREATE_ALL_TABLES: "${CREATE_ALL_TABLES:-false}"
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ajax_network

  telegram-bot:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:latest}
    container_name: sa-helper-telegram-bot
    restart: unless-stopped
    init: true
    user: "${PUID}:${PGID}"
    stop_grace_period: 60s
    depends_on:
      api:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command:
      - python
      - -m
      - app.services.telegram_bot
    environment:
      <<: *common-env
      TELEGRAM_BOT_ENABLED: "true"
      START_TELEGRAM_BOT_IN_API: "false"
      RUN_ALEMBIC_MIGRATIONS: "false"
      CREATE_ALL_TABLES: "false"
    volumes: *common-volumes
    networks:
      - ajax_network

  redis:
    image: redis:7-alpine
    container_name: sa-helper-redis
    restart: unless-stopped
    profiles: ["scale"]
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - ${CONFIG_PATH:-./runtime}/sa_helper/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ajax_network

  worker:
    image: ${SA_HELPER_IMAGE:-ghcr.io/jack101a/sa-helper:latest}
    container_name: sa-helper-worker
    restart: unless-stopped
    init: true
    profiles: ["scale"]
    user: "${PUID}:${PGID}"
    stop_grace_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command:
      - celery
      - -A
      - app.workers.celery_app.celery_app
      - worker
      - --loglevel=INFO
      - --concurrency=${WORKER_CONCURRENCY:-2}
      - -Q
      - solve-heavy,feedback,maintenance,default
    environment:
      <<: *common-env
      REDIS_ENABLED: "true"
      SOLVE_BACKEND: "${WORKER_SOLVE_BACKEND:-celery_sync}"
      RUN_ALEMBIC_MIGRATIONS: "false"
      CREATE_ALL_TABLES: "false"
    volumes: *common-volumes
    healthcheck:
      test: ["CMD", "celery", "-A", "app.workers.celery_app.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - ajax_network

networks:
  ajax_network:
    name: ${COMPOSE_PROJECT_NAME:-sahelper}_network
