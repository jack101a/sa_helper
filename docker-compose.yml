services:
  sa-helper:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper
    restart: unless-stopped
    init: true
    stop_grace_period: 60s
    depends_on:
      payload-signer:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - PORT=8080
      # Auth Settings
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      # Exam AI Settings
      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - QUEUE_WORKERS=${QUEUE_WORKERS:-4}
      - EXAM_OCR_CONCURRENCY=${EXAM_OCR_CONCURRENCY:-2}
      - RUN_BACKGROUND_TASKS=false
      - RUN_MIGRATIONS=true
      # WhatsApp Alerts (Optional)
      - CALLMEBOT_PHONE=${CALLMEBOT_PHONE:-}
      - CALLMEBOT_APIKEY=${CALLMEBOT_APIKEY:-}
      # Telegram Bot (optional; DB/admin token is also supported)
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      - RCLONE_CONFIG=/root/.config/rclone/rclone.conf
      # Executable payload signing (private key stays in payload-signer)
      - PAYLOAD_SIGNER_URL=${PAYLOAD_SIGNER_URL:-http://payload-signer:8091}
      - PAYLOAD_SIGNER_TOKEN=${PAYLOAD_SIGNER_TOKEN:-}
      # Paths (Internal)
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config
      - sa_helper_rclone:/root/.config/rclone

  payload-signer:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper-payload-signer
    restart: unless-stopped
    init: true
    command: ["uvicorn", "app.signer_app:app", "--host", "0.0.0.0", "--port", "8091", "--workers", "1"]
    environment:
      - RUN_MIGRATIONS=false
      - PAYLOAD_SIGNER_TOKEN=${PAYLOAD_SIGNER_TOKEN:-}
      - PAYLOAD_SIGNING_PRIVATE_KEY_PATH=/run/sa-helper-signing/payload_signing_private.pem
      - PAYLOAD_SIGNING_PUBLIC_KEY_PATH=/run/sa-helper-signing/payload_signing_public.spki.b64
      - PAYLOAD_SIGNING_ALLOW_CREATE=true
    volumes:
      - sa_helper_signing:/run/sa-helper-signing
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8091/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  scheduler:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper-scheduler
    restart: unless-stopped
    init: true
    depends_on:
      - sa-helper
    command: ["python", "-m", "app.scheduler"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - LITELLM_ENDPOINT=${LITELLM_ENDPOINT:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      - RCLONE_CONFIG=/root/.config/rclone/rclone.conf
      - RUN_MIGRATIONS=false
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config
      - sa_helper_rclone:/root/.config/rclone

  telegram-bot:
    image: ghcr.io/jack101a/sa-helper:latest
    container_name: sa-helper-telegram-bot
    restart: unless-stopped
    init: true
    depends_on:
      - sa-helper
    command: ["python", "-m", "app.services.telegram_bot"]
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DEBUG=${DEBUG:-false}
      - AUTH_HASH_SALT=${AUTH_HASH_SALT:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_BOT_ENABLED=${TELEGRAM_BOT_ENABLED:-}
      - TELEGRAM_BOT_WAIT_FOR_TOKEN=${TELEGRAM_BOT_WAIT_FOR_TOKEN:-true}
      - RUN_MIGRATIONS=false
      - SQLITE_PATH=/app/backend/logs/app.db
      - CONFIG_PATH=/app/backend/config/config.yaml
      - ONNX_PATH=/app/data/models/model.onnx
    volumes:
      - sa_helper_logs:/app/backend/logs
      - sa_helper_data:/app/data
      - sa_helper_config:/app/backend/config

volumes:
  sa_helper_logs:
  sa_helper_data:
  sa_helper_config:
  sa_helper_rclone:
  sa_helper_signing:
