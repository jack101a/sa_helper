<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Key Created</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans flex items-center justify-center min-h-screen p-4">
    <div class="bg-gray-800 rounded-lg border border-gray-700 shadow-xl p-8 max-w-lg w-full text-center">
        <h1 class="text-2xl font-bold text-green-400 mb-4">API Key Created!</h1>
        <p class="text-sm text-gray-400 mb-2">Name: <strong class="text-white">{{ key_name }}</strong></p>
        <p class="text-sm text-gray-400 mb-6">Expires: <strong class="text-white">{{ expires_at or "Never" }}</strong></p>
        
        <div class="bg-gray-900 border border-gray-600 rounded-lg p-4 mb-6">
            <p class="text-xs text-yellow-400 mb-2">Copy this key now — it won't be shown again!</p>
            <code class="text-lg text-green-300 font-mono break-all select-all">{{ api_key }}</code>
        </div>
        
        <a href="/admin/" class="inline-block bg-blue-600 hover:bg-blue-700 text-white py-2 px-6 rounded-md font-medium transition-colors">
            Back to Dashboard
        </a>
    </div>
</body>
</html>
