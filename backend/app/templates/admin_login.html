<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans flex items-center justify-center min-h-screen p-4">
    <div class="bg-gray-800 rounded-lg border border-gray-700 shadow-xl p-8 max-w-md w-full">
        <h1 class="text-2xl font-bold mb-2 text-white">Admin Login</h1>
        <p class="text-sm text-gray-400 mb-6">Sign in using admin username/password.</p>
        {% if error %}
        <div class="mb-4 text-sm text-red-300 bg-red-900/30 border border-red-700 rounded px-3 py-2">{{ error }}</div>
        {% endif %}
        <form action="/admin/login" method="post" class="space-y-4">
            {% if enable_password_login %}
            <div>
                <label for="admin_username" class="block text-sm text-gray-300 mb-1">Username</label>
                <input id="admin_username" name="admin_username" type="text" class="w-full bg-gray-900 border border-gray-700 rounded-md py-2 px-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
            </div>
            <div>
                <label for="admin_password" class="block text-sm text-gray-300 mb-1">Password</label>
                <input id="admin_password" name="admin_password" type="password" class="w-full bg-gray-900 border border-gray-700 rounded-md py-2 px-3 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" />
            </div>
            {% endif %}

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-md text-sm font-medium">Sign In</button>
        </form>
    </div>
</body>
</html>
