# Nginx config — Two-server setup for Unified Platform
# Server A: Primary (active)
# Server B: Backup (cold standby — only used if Server A fails)

upstream unified_platform {
    server SERVER_A_IP:8080;               # Primary
    server SERVER_B_IP:8080 backup;        # Standby — activated only on primary failure
    keepalive 32;
}

# Health-check interval (requires nginx_upstream_check_module or use passive checks)
# Passive: Nginx marks upstream down after 2 consecutive 5xx responses

server {
    listen 80;
    server_name your-server.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-server.com;

    # SSL (replace with your cert paths — use Let's Encrypt/Certbot)
    ssl_certificate     /etc/letsencrypt/live/your-server.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-server.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;

    # Rate limiting (global, per IP)
    # Define zone in http block: limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    limit_req zone=api burst=10 nodelay;

    # Proxy to backend
    location / {
        proxy_pass         http://unified_platform;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # Health probe (no auth required)
    location /health {
        proxy_pass http://unified_platform/health;
        access_log off;
    }
}
